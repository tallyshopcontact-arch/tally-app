<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px; height: 1080px; overflow: hidden;
  background: #0a0a0a; color: white;
  font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

@keyframes orb-drift-1 {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
  33% { transform: translate(-40px, 30px) scale(1.06); opacity: 1; }
  66% { transform: translate(20px, -20px) scale(0.96); opacity: 0.75; }
}
@keyframes orb-drift-2 {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.5; }
  40% { transform: translate(35px, -25px) scale(1.08); opacity: 0.7; }
  72% { transform: translate(-25px, 15px) scale(0.94); opacity: 0.55; }
}
@keyframes orb-drift-3 {
  0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.35; }
  50% { transform: translate(-18px, -30px) scale(1.05); opacity: 0.55; }
}

.post {
  position: relative; width: 1080px; height: 1080px; padding: 80px;
  overflow: hidden;
}

.orb {
  position: absolute; border-radius: 50%; filter: blur(100px);
  pointer-events: none; z-index: 0;
}
.orb-1 {
  width: 700px; height: 700px; bottom: -200px; left: -100px;
  background: radial-gradient(circle, rgba(88,28,160,0.22) 0%, transparent 70%);
  animation: orb-drift-1 30s ease-in-out infinite;
}
.orb-2 {
  width: 540px; height: 540px; top: -120px; right: -80px;
  background: radial-gradient(circle, rgba(30,58,138,0.14) 0%, transparent 70%);
  animation: orb-drift-2 36s ease-in-out infinite;
}
.orb-3 {
  width: 380px; height: 380px; top: 30%; right: 20%;
  background: radial-gradient(circle, rgba(67,20,120,0.12) 0%, transparent 70%);
  animation: orb-drift-3 24s ease-in-out infinite;
}

.post::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 28px 28px; pointer-events: none; z-index: 1;
}

.content {
  position: relative; z-index: 2;
  display: flex; flex-direction: column; height: 100%;
}

.top-bar {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 28px; border-bottom: 1px solid rgba(255,255,255,0.07);
  margin-bottom: 52px; flex-shrink: 0;
}
.wordmark { font-size: 24px; font-weight: 700; letter-spacing: 0.3em; color: white; }
.slide-num { font-size: 11px; color: #475569; letter-spacing: 0.14em; font-weight: 500; }

.cta-wrapper {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

h1 {
  font-size: 84px; font-weight: 800; line-height: 1.04;
  letter-spacing: -0.030em; color: white; margin-bottom: 30px;
}

.subtext {
  font-size: 20px; color: #94a3b8; line-height: 1.6;
  font-weight: 400; margin-bottom: 52px;
}

.btn-wrap {
  display: flex;
}

.cta-btn {
  border: 1px solid rgba(255,255,255,0.28);
  padding: 18px 40px;
  font-size: 16px; font-weight: 600; color: white;
  letter-spacing: 0.04em; font-family: inherit;
}
</style>
</head>
<body>
<div class="post">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <div class="content">
    <div class="top-bar">
      <span class="wordmark">TALLY</span>
      <span class="slide-num">07 / 07</span>
    </div>
    <div class="cta-wrapper">
      <h1>Stop guessing.<br>Start growing.</h1>
      <p class="subtext">Free beta now open for beat producers.</p>
      <div class="btn-wrap">
        <span class="cta-btn">Join at tallyagc.com →</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
