<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

body {
  width: 1080px; height: 1080px; overflow: hidden;
  background: #0a0a0a; color: white;
  font-family: 'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

.post { position: relative; width: 1080px; height: 1080px; padding: 80px; }

.post::before {
  content: ''; position: absolute; inset: 0;
  background-image: radial-gradient(rgba(255,255,255,0.035) 1px, transparent 1px);
  background-size: 28px 28px; pointer-events: none; z-index: 0;
}

.content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column; height: 100%;
}

.top-bar {
  display: flex; justify-content: space-between; align-items: baseline;
  padding-bottom: 28px; border-bottom: 1px solid #1a1a1a;
  margin-bottom: 52px; flex-shrink: 0;
}
.wordmark { font-size: 24px; font-weight: 700; letter-spacing: 0.3em; color: white; }
.slide-num { font-size: 11px; color: #475569; letter-spacing: 0.14em; font-weight: 500; }

.qa-wrapper { flex: 1; display: flex; flex-direction: column; }
.q-block { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 44px; }
.a-block { flex: 1; display: flex; flex-direction: column; justify-content: flex-start; padding-top: 44px; }
.divider { flex-shrink: 0; height: 1px; background: #1e1e1e; }

.q-label {
  font-size: 10px; color: #94a3b8; letter-spacing: 0.22em;
  text-transform: uppercase; font-weight: 700; margin-bottom: 18px;
}
.question {
  font-size: 64px; font-weight: 800; letter-spacing: -0.024em;
  line-height: 1.06; color: white;
}
.a-label {
  font-size: 10px; color: white; letter-spacing: 0.22em;
  text-transform: uppercase; font-weight: 700; margin-bottom: 18px;
}
.answer {
  font-size: 20px; color: #94a3b8; line-height: 1.72; font-weight: 400;
}

.stat {
  color: white; font-weight: 600;
}
</style>
</head>
<body>
<div class="post">
  <div class="content">
    <div class="top-bar">
      <span class="wordmark">TALLY</span>
      <span class="slide-num">05 / 07</span>
    </div>
    <div class="qa-wrapper">
      <div class="q-block">
        <p class="q-label">Q:</p>
        <h2 class="question">What about<br>thumbnails?</h2>
      </div>
      <div class="divider"></div>
      <div class="a-block">
        <p class="a-label">A:</p>
        <p class="answer">The top CTR thumbnails in boom bap right now average <span class="stat">12% click-through</span>. Most small channels are at 3-4%. Dark background, one word, high contrast. Simple — but most producers never study it.</p>
      </div>
    </div>
  </div>
</div>
</body>
</html>
