<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="TALLY">
  <title>TALLY</title>

  <rect width="320" height="72" fill="#0a0a0a"/>

  <!--
    Icon mark — bars in brand purple #8B5CF6.
    Scale factor 36/200 = 0.18. Bar width 5px, gap 3px. Baseline y=52.
  -->
  <rect x="20" y="45" width="5" height="7"  rx="1.5" fill="#8B5CF6"/>
  <rect x="28" y="41" width="5" height="11" rx="1.5" fill="#8B5CF6"/>
  <rect x="36" y="34" width="5" height="18" rx="1.5" fill="#8B5CF6"/>
  <rect x="44" y="25" width="5" height="27" rx="1.5" fill="#8B5CF6"/>
  <rect x="52" y="16" width="5" height="36" rx="1.5" fill="#8B5CF6"/>

  <!-- Thin separator -->
  <line x1="66" y1="20" x2="66" y2="52" stroke="#222222" stroke-width="1"/>

  <!--
    Wordmark. The T is purple to create a visual anchor — it ties the
    first letter to the mark and gives the eye a landing point.
    ALLY follows in white at the same weight and size.
  -->
  <text
    x="78"
    y="52"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="10"
  ><tspan fill="#8B5CF6">T</tspan><tspan fill="white">ALLY</tspan></text>
</svg>
