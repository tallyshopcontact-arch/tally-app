<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" width="320" height="72" role="img" aria-label="TALLY">
  <title>TALLY</title>

  <rect width="320" height="72" fill="#0a0a0a"/>

  <!--
    Icon mark — scaled from the 400×400 standalone icon.
    Scale factor: 36/200 = 0.18. Bar width 5px, gap 3px.
    All bars share baseline y=52. Canvas height 72px.
  -->
  <rect x="20" y="45" width="5" height="7"  rx="1.5" fill="white"/>
  <rect x="28" y="41" width="5" height="11" rx="1.5" fill="white"/>
  <rect x="36" y="34" width="5" height="18" rx="1.5" fill="white"/>
  <rect x="44" y="25" width="5" height="27" rx="1.5" fill="white"/>
  <rect x="52" y="16" width="5" height="36" rx="1.5" fill="white"/>

  <!--
    Thin vertical separator between icon and wordmark.
    Sits between x=64 and x=68.
  -->
  <line x1="66" y1="20" x2="66" y2="52" stroke="#222222" stroke-width="1"/>

  <!--
    TALLY wordmark. Font stack matches the site's geometric sans-serif.
    Baseline at y=52 aligns with the bottom of the tallest bar.
    letter-spacing="10" gives the premium wide tracking of the brand.
  -->
  <text
    x="78"
    y="52"
    font-family="'Helvetica Neue', Helvetica, 'Arial', sans-serif"
    font-size="38"
    font-weight="700"
    letter-spacing="10"
    fill="white"
  >TALLY</text>
</svg>
